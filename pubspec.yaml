name: vaultrex
description: Vaultrex — offline Riftbound collecting. Rip packs, collect, flip, grade.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  intl: ^0.20.3
  collection: ^1.19.1
  uuid: ^4.6.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  google_fonts: ^8.2.0
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/data/riftbound_catalog.json
    - assets/data/sealed_products.json
    - assets/data/price_history.json
    - assets/logos/
    - assets/sealed/
    - assets/card_backs/
    - assets/featured_packs/
