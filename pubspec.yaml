name: bindora
description: Bindora - offline TCG collecting. Rip packs, collect, flip, grade.
publish_to: 'none'
version: 1.4.7+21

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  intl: ^0.20.3
  collection: ^1.19.1
  uuid: ^4.6.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  flutter_svg: ^2.3.0
  http: ^1.4.0
  audioplayers: ^6.8.1
  flutter_local_notifications: ^22.1.0
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/riftbound_catalog.json
    - assets/data/sealed_products.json
    - assets/data/pokemon_catalog.json
    - assets/data/pokemon_sealed.json
    - assets/data/pokemon_featured_packs.json
    - assets/data/mtg_catalog.json
    - assets/data/mtg_sealed.json
    - assets/data/onepiece_catalog.json
    - assets/data/onepiece_sealed.json
    - assets/data/yugioh_catalog.json
    - assets/data/yugioh_sealed.json
    - assets/data/gundam_catalog.json
    - assets/data/gundam_sealed.json
    - assets/data/price_history.json
    - assets/logos/
    - assets/sealed/
    - assets/card_backs/
    - assets/featured_packs/riftbound/
    - assets/featured_packs/pokemon/
    - assets/featured_packs/mtg/
    - assets/featured_packs/onepiece/
    - assets/featured_packs/yugioh/
    - assets/featured_packs/gundam/
    - assets/card_art/onepiece/
    - assets/card_art/yugioh/
    - assets/onboarding/
    - assets/instapacks/
    - assets/rip/
    - assets/rip/frames/
    - assets/sfx/
    - assets/avatars/
    - assets/mascot/pixel_cat/walk/
    - assets/mascot/pixel_cat/idle/
    - assets/mascot/pixel_cat/scratch/
    - assets/mascot/pixel_cat/happy/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-ExtraBold.ttf
          weight: 800
