name: bindora
description: Bindora - offline TCG collecting. Rip packs, collect, flip, grade.
publish_to: 'none'
version: 1.4.5+19

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  intl: ^0.20.3
  collection: ^1.19.1
  uuid: ^4.6.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  flutter_svg: ^2.3.0
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/riftbound_catalog.json
    - assets/data/sealed_products.json
    - assets/data/pokemon_catalog.json
    - assets/data/pokemon_sealed.json
    - assets/data/pokemon_featured_packs.json
    - assets/data/mtg_catalog.json
    - assets/data/mtg_sealed.json
    - assets/data/price_history.json
    - assets/logos/
    - assets/sealed/
    - assets/card_backs/
    - assets/featured_packs/riftbound/
    - assets/featured_packs/pokemon/
    - assets/featured_packs/mtg/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-ExtraBold.ttf
          weight: 800
